[SERVICE]
    Daemon          Off
    Log_Level       info
    Parsers_File    /fluent-bit/parsers.conf

[INPUT]
    Name            tail
    Path            /var/lib/docker/containers/*/*-json.log
    Parser          docker
    Tag             docker.*
    Read_from_Head  true
    Docker_Mode     On
    Docker_Mode_Flush  4
    Mem_Buf_Limit   50MB
    Skip_Long_Lines On
    DB              /fluent-bit/tail_docker.db

[FILTER]
    Name            parser
    Match           docker.*
    Key_Name        log
    Parser          interview_json
    Reserve_Data    On
    Preserve_Key    Off

[FILTER]
    Name            nest
    Match           docker.*
    Operation       lift
    Nested_Under    docker

[FILTER]
    Name            modify
    Match           docker.*
    Rename          container_id container_id
    Add             source fluent-bit

[OUTPUT]
    Name            es
    Match           docker.*
    Host            elasticsearch
    Port            9200
    Index           interview-logs
    Logstash_Format On
    Logstash_Prefix interview-logs
    Logstash_DateFormat %Y.%m.%d
    Replace_Dots   On
    Retry_Limit    False
    tls            Off