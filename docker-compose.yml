services:
  interviewtrainingauth:
    image: ${DOCKER_REGISTRY}interviewtrainingauth
    build:
      context: ./InterviewTraining_Identity
      dockerfile: SevSharks.Identity.WebUI/Dockerfile
    env_file:
      - .envinterviewtrainingauth
    ports:
      - "5107:5107"
      - "5108:5108"
    restart: always
    volumes:
      - ../certificates_for_interview_training_site_docker:/root/certificates/:ro
  interviewtrainingapi:
    image: ${DOCKER_REGISTRY}interviewtrainingapi
    build:
      context: ./InterviewTraining_Api
      dockerfile: src/InterviewTraining.Api/Dockerfile
    env_file:
      - .envinterviewtrainingapi
    ports:
      - "53383:53383"
      - "53384:53384"
    restart: always
    depends_on:
      - interviewtrainingauth
      - elasticsearch
    volumes:
      - ../certificates_for_interview_training_site_docker:/root/certificates/:ro
  interviewtrainingmnigrator:
    image: ${DOCKER_REGISTRY}interviewtrainingmnigrator
    build:
      context: ./InterviewTraining_Identity_Api_Migrator/InterviewTraining_Identity_Api_Migrator
      dockerfile: Dockerfile
    env_file:
      - .envinterviewtrainingmigrator
    restart: always
    depends_on:
      - interviewtrainingapi
      - interviewtrainingauth
  interviewtrainingwebspa:
    image: ${DOCKER_REGISTRY}interviewtrainingwebspa
    build:
      context: ./InterviewTraining_Ui
      dockerfile: Dockerfile
      args:
        configuration: docker
    ports:
      - "8182:443"
      - "8183:80"
    restart: always
    volumes:
      - ../certificates_for_interview_training_site_docker:/etc/nginx/ssl/:ro
    depends_on:
      - interviewtrainingapi
      - interviewtrainingauth
      - interviewtrainingmnigrator
  elasticsearch:
    image: elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    restart: always
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
  kibana:
    image: kibana:8.17.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: always
    depends_on:
      - elasticsearch
  fluentbit:
    image: ${DOCKER_REGISTRY}interviewtrainingfluentbit
    build:
      context: ./fluent-bit
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - elasticsearch
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  elasticsearch_data:

networks:
  default:
    name: local
    external: true